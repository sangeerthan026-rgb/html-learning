<!doctype html>
<html>
<head>
    <title>intro</title>
</head>
<body>
    <div>
        <h1>TYPES of list</h1>
        </div>
        <div>
            <h3>unordered list</h3>
            <ul type="circle">
                <li>Introduction</li>
                <li>education</li>
                <li>hobbies</li>
            </ul>
        </div>
        <div>
            <h3>ordered list</h3>
            <ol type="1" start="3">
                <li>introduction</li>
                <li>education</li>
                <li>hobbies</li>
            </ol>
        </div>
</body>
</html>
