<!DOCTYPE html>
<html>
    <head>
        <center>
        <title>Product Form</title>
    </head>
    <style>
        body{
            background-color: lightblue;
        }
    </style>
    <body>
        <div>
            <table>
                <center>
                <h1>Product Details</h1>
            </center></table>
        <form method="post" enctype="multipart/form-data">
            <table> 
                <center>
                <tr>
                    <td><label for="productid">Product id</label></td>
                    <td><input type="text" id="productid" name="productid"></td>
                </tr>
                <tr>
                    <td><label for="productname">Product name</label></td>
                    <td><input type="text" id="productname" name="productname"></td>
                </tr>
                <tr>
                    <td><label for="category">Category</label></td>
                    <td><select>
                        <option>enter category</option>
                        <option>vegetables</option>
                        <option>fruits</option>
                    </select></td>
                </tr>
                <tr>
                    <td>
                        <label for="manufacturingDate">Manufacturing Date</label>
                    </td>
                    <td>
                        <input type="text" id="manufacturingDate" name="manufacturingDate" value="2026-05-01">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="expiry">Expiry Date</label>
                    </td>
                    <td><input type="date" id="expiry" name="expiry" value="2027-06-01"></td>
                </tr>
                <tr>
                    <td>
                        <label for="productQuantity">Product Quantity</label>
                    </td>
                    <td>
                        <select name="productQuantity">
                            <option>enter quantity</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                        </select>
                    </td>
                </tr>
                <div class="selectbox"
                    <td>
                        <label for="Items">Items</label>
                        <select name="Items" id="Items">
                           <option value="">choose Item</option>            
                           <option value="apple">Apple</option>
                           <option value="banana">Banana</option>
                           <option value="orange">Orange</option>
                           <option value="tomato">Tomato</option>
                           <option value="onion">Onion</option>
                        </select>
                    </td>
                </div>
                <tr>
                    <td>
                        <label for="image">Product Image</label>
                    </td>
                    <td><input type="file" id="image" name="image"></td>
                </tr>
                <tr>
                    <td>
                        <label for="contact">Help Line</label>
                    </td>
                    <td>
                    <input type="tel"
                        name="sample-text"
                        id="contact"
                        value="9087654321"
                        readonly
                        required/>
                        </td>
                </tr>
                <tr>
                    <td>
                        <center>
                        <button style="background-color: blue; color: white;" type="submit">submit</button>
                        </center>
                    </td>
                </tr>
                   </center>
                </table>
            </form>
        </div>
    </body>
</html>
